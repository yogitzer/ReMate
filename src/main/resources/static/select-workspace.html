<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ReMate | 시작하기</title>
  <style>
    :root { --green: #10b981; --primary: #3b82f6; --bg: #f8fafc; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 450px; margin-bottom: 24px; }
    h2 { font-size: 1.25rem; margin-top: 0; margin-bottom: 20px; }
    input { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; }
    .btn-create { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    .invitation-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid #f1f5f9; border-radius: 10px; margin-bottom: 8px; }
    .btn-accept { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .empty-msg { text-align: center; color: #94a3b8; padding: 20px 0; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="card">
  <h2>✨ 새 워크스페이스 만들기</h2>
  <input type="text" id="wsName" placeholder="워크스페이스 이름 입력">
  <button class="btn-create" onclick="createWs()">워크스페이스 생성</button>
</div>
<div class="card">
  <h2>📩 초대받은 워크스페이스</h2>
  <div id="invitationList"></div>
</div>
<script>
  const token = localStorage.getItem('accessToken');
  window.onload = loadInvitations;
  async function createWs() {
    const name = document.getElementById('wsName').value;
    if(!name) return alert("이름을 입력하세요.");
    const res = await fetch(`/api/v1/workspaces?name=${encodeURIComponent(name)}`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.success) location.href = '/workspace-list.html';
  }
  async function loadInvitations() {
    const res = await fetch('/api/v1/workspaces/invitations', { headers: { 'Authorization': `Bearer ${token}` } });
    const response = await res.json();
    const list = response.data;
    if (list.length === 0) {
      document.getElementById('invitationList').innerHTML = '<p class="empty-msg">아직 초대받은 워크스페이스가 없어요</p>';
      return;
    }
    document.getElementById('invitationList').innerHTML = list.map(inv => `
                <div class="invitation-item">
                    <span>${inv.workspaceName || '워크스페이스'}</span>
                    <button class="btn-accept" onclick="acceptInv(${inv.id})">수락하기</button>
                </div>
            `).join('');
  }
  async function acceptInv(id) {
    const res = await fetch(`/api/v1/workspaces/invitations/${id}/accept`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.success) location.href = '/workspace-list.html';
  }
</script>
</body>
</html>
