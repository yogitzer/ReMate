<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReMate | 시작하기</title>
    <style>
        :root { --google: #4285F4; --kakao: #FEE500; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 48px 40px; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); text-align: center; width: 100%; max-width: 400px; }
        .logo { font-size: 2rem; font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .subtitle { color: #64748b; font-weight: 600; margin-bottom: 32px; font-size: 0.95rem; }
        .btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; text-decoration: none; font-weight: bold; font-size: 1rem; border: none; cursor: pointer; transition: 0.2s; box-sizing: border-box; text-align: center; }
        .btn-google { background: var(--google); color: white; }
        .btn-kakao { background: var(--kakao); color: #3c1e1e; }
        .btn-email { background: var(--dark); color: white; margin-top: 12px; }
        .btn-signup { background: white; color: var(--dark); border: 1.5px solid #e2e8f0; margin-top: 8px; }
        .btn-signup:hover { background: #f1f5f9; }
        .divider { margin: 24px 0; display: flex; align-items: center; color: #cbd5e1; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin: 0 16px; }
        .hidden { display: none; }
        .loading { font-size: 0.9rem; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">📄 ReMate</div>
    <div id="auth-ui">
        <p class="subtitle">영수증 관리의 시작</p>
        <a href="/oauth2/authorization/google" class="btn btn-google">Google로 시작하기</a>
        <a href="/oauth2/authorization/kakao" class="btn btn-kakao">Kakao로 시작하기</a>
        <div class="divider">또는</div>
        <a href="/signin.html" class="btn btn-email">이메일로 로그인</a>
        <a href="/signup.html" class="btn btn-signup">회원가입</a>
    </div>
    <div id="loading-ui" class="hidden">
        <div class="loading">정보를 불러오는 중입니다...</div>
    </div>
</div>
<script>
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            localStorage.setItem('accessToken', tokenFromUrl);
            window.history.replaceState({}, document.title, "/");
        }
        const token = localStorage.getItem('accessToken');
        if (token) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('loading-ui').classList.remove('hidden');
            checkEntry(token);
        }
    };
    async function checkEntry(token) {
        try {
            const res = await fetch('/api/v1/workspaces/entry-check', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await res.json();
            if (result.success) {
                if (result.data.workspaceCount === 0) {
                    location.href = '/select-workspace.html';
                } else {
                    location.href = '/workspace-list.html';
                }
            } else { handleAuthError(); }
        } catch (e) { handleAuthError(); }
    }
    function handleAuthError() {
        localStorage.clear();
        document.getElementById('auth-ui').classList.remove('hidden');
        document.getElementById('loading-ui').classList.add('hidden');
    }
</script>
</body>
</html>
